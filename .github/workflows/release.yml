name: Draft Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, e.g. v1.2.3
        required: true
        type: string
      release_title:
        description: Release title
        required: true
        type: string

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $env:CGO_ENABLED = "0"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -trimpath -ldflags "-s -w" -o "dist/SlayModGo.exe" .

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.tag }}" "dist/SlayModGo.exe" --draft --title "${{ inputs.release_title }}" --target "${{ github.sha }}" --notes ""
